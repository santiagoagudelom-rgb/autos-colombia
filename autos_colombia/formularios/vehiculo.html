<!DOCTYPE html>
<html>
<head>
    <title>Registrar Vehículo</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="container">
    <h2>Registrar Vehículo</h2>

    <form action="../vehiculos/crear.php" method="POST">

    </form>
